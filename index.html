<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GanttSmart — The planning layer Linear is missing. Map real timelines, catch conflicts early, and share clear roadmaps with clients. Built on top of Linear, not a replacement." />
    <meta name="theme-color" content="#09090b" />
    <meta property="og:title" content="GanttSmart — Planning layer for Linear" />
    <meta property="og:description" content="Linear nails execution. GanttSmart fills the planning gap. Drag-and-drop timelines, cross-project visibility, and client-ready roadmaps." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ganttsmart.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GanttSmart — Planning layer for Linear" />
    <meta name="twitter:description" content="Linear nails execution. GanttSmart fills the planning gap. Drag-and-drop timelines, cross-project visibility, and client-ready roadmaps." />
    <link rel="canonical" href="https://ganttsmart.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <title>GanttSmart — Planning layer for Linear</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GanttSmart",
      "url": "https://ganttsmart.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "The planning layer Linear is missing. Map real timelines, catch conflicts early, and share clear roadmaps with clients.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "sideq.io",
        "url": "https://sideq.io"
      }
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading skeleton shown before React hydrates -->
      <style>
        .skeleton-loader {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #09090b;
        }
        .skeleton-spinner {
          width: 40px;
          height: 40px;
          border: 3px solid #27272a;
          border-top-color: #7c5cfc;
          border-radius: 50%;
          animation: sk-spin 0.7s linear infinite;
        }
        @keyframes sk-spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="skeleton-loader">
        <div class="skeleton-spinner"></div>
      </div>
    </div>
    <noscript>
      <div style="padding: 40px; text-align: center; font-family: sans-serif; color: #fafafa; background: #09090b; min-height: 100vh;">
        <h1>GanttSmart</h1>
        <p>JavaScript is required to run this application.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
