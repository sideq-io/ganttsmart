<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Roadmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    padding: 40px;
  }

  /* --- Auth overlay --- */
  .auth-overlay {
    position: fixed; inset: 0;
    background: rgba(15,17,23,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }
  .auth-overlay.hidden { display: none; }
  .auth-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .auth-box h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .auth-box p { font-size: 13px; color: #8b949e; margin-bottom: 24px; line-height: 1.5; }
  .auth-input {
    width: 100%;
    padding: 12px 16px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e1e4e8;
    font-size: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: #58a6ff; }
  .auth-btn {
    width: 100%;
    padding: 12px;
    background: #238636;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .auth-btn:hover { background: #2ea043; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-error {
    color: #f85149;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }

  /* --- Toolbar --- */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .toolbar-btn {
    padding: 7px 14px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex; align-items: center; gap: 6px;
  }
  .toolbar-btn:hover { background: #30363d; color: #e1e4e8; }
  .toolbar-btn.danger:hover { background: rgba(248,81,73,0.15); color: #f85149; border-color: rgba(248,81,73,0.3); }
  .toolbar-btn .spinner {
    width: 12px; height: 12px;
    border: 2px solid #484f58;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .toolbar-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .last-synced {
    font-size: 11px;
    color: #484f58;
    margin-left: auto;
  }

  /* --- Header --- */
  .header { margin-bottom: 36px; }
  .header h1 {
    font-size: 28px; font-weight: 800; color: #fff;
    margin-bottom: 6px; letter-spacing: -0.5px;
  }
  .header p { font-size: 14px; color: #8b949e; }
  .header p#subtitle { margin-top: 4px; }

  /* --- Legend --- */
  .legend { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  /* --- Stats --- */
  .stats-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-card {
    background: #161b22; border: 1px solid #21262d;
    border-radius: 10px; padding: 18px 24px; min-width: 150px; flex: 1;
  }
  .stat-value { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-urgent .stat-value { color: #f85149; }
  .stat-high .stat-value { color: #ffa657; }
  .stat-medium .stat-value { color: #d2992a; }
  .stat-low .stat-value { color: #8b949e; }

  /* --- Section header --- */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    margin-top: 32px;
  }
  .section-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: #e1e4e8;
    letter-spacing: -0.3px;
  }
  .section-header .task-count {
    font-size: 12px;
    font-weight: 600;
    color: #8b949e;
    background: #21262d;
    padding: 2px 10px;
    border-radius: 12px;
  }
  .section-toggle {
    margin-left: auto;
    padding: 4px 12px;
    background: none;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .section-toggle:hover { background: #21262d; color: #e1e4e8; }

  /* --- Gantt --- */
  .gantt-container {
    background: #161b22; border-radius: 12px;
    border: 1px solid #21262d; overflow-x: auto;
  }
  .gantt-table { width: max-content; border-collapse: collapse; }
  .gantt-header th {
    padding: 14px 16px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px; color: #8b949e;
    text-align: left; border-bottom: 1px solid #21262d;
    background: #1c2129; position: sticky; top: 0; z-index: 5;
  }
  .gantt-header .calendar-header { padding: 0; }
  .month-row { display: flex; border-bottom: 1px solid #21262d; }
  .month-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: #8b949e; padding: 10px 0;
    text-align: center; border-right: 1px solid #21262d;
  }
  .days-row { display: flex; }
  .day-cell {
    font-size: 10px; color: #484f58; text-align: center;
    padding: 6px 0; border-right: 1px solid rgba(33,38,45,0.5); flex-shrink: 0;
  }
  .day-cell.weekend { background: rgba(255,255,255,0.02); color: #30363d; }
  .day-cell.today { color: #58a6ff; font-weight: 700; background: rgba(88,166,255,0.06); }
  .gantt-row { transition: background 0.15s; cursor: pointer; }
  .gantt-row:hover { background: rgba(88,166,255,0.04); }
  .gantt-row.selected { background: rgba(88,166,255,0.08); }
  .gantt-row td { border-bottom: 1px solid #21262d; vertical-align: middle; }
  .task-info { padding: 14px 16px; min-width: 320px; max-width: 320px; width: 320px; }
  .task-id { font-size: 11px; font-weight: 600; margin-bottom: 3px; letter-spacing: 0.3px; }
  .task-title {
    font-size: 13px; font-weight: 500; color: #e1e4e8; line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
  }
  .task-status {
    font-size: 10px; color: #484f58; margin-top: 2px;
  }
  .task-priority { padding: 12px 16px; width: 100px; min-width: 100px; }
  .priority-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; letter-spacing: 0.3px;
  }
  .priority-urgent { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.25); }
  .priority-high { background: rgba(255,166,87,0.15); color: #ffa657; border: 1px solid rgba(255,166,87,0.25); }
  .priority-medium { background: rgba(210,153,34,0.15); color: #d2992a; border: 1px solid rgba(210,153,34,0.25); }
  .priority-low { background: rgba(139,148,158,0.15); color: #8b949e; border: 1px solid rgba(139,148,158,0.25); }
  .priority-none { background: rgba(72,79,88,0.15); color: #484f58; border: 1px solid rgba(72,79,88,0.25); }
  .task-due {
    padding: 12px 16px; font-size: 12px; color: #8b949e;
    width: 110px; min-width: 110px; white-space: nowrap;
  }
  .chart-cell { padding: 10px 0; position: relative; }
  .chart-area { position: relative; height: 32px; display: flex; align-items: center; }
  .bar-track { position: absolute; left: 0; right: 0; top: 0; bottom: 0; display: flex; }
  .bar-day {
    flex-shrink: 0; height: 100%;
    border-right: 1px solid rgba(33,38,45,0.3);
  }
  .bar-day.weekend { background: rgba(255,255,255,0.015); }
  .bar-day.today { background: rgba(88,166,255,0.05); border-right: 1px dashed rgba(88,166,255,0.3); }
  .gantt-bar {
    position: absolute; height: 26px; border-radius: 6px; top: 3px;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px; font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.7); transition: filter 0.2s, transform 0.15s;
    z-index: 2; min-width: 20px;
  }
  .gantt-bar:hover { filter: brightness(1.2); transform: scaleY(1.1); }
  .bar-urgent { background: linear-gradient(135deg, #da3633, #f85149); box-shadow: 0 2px 8px rgba(248,81,73,0.3); }
  .bar-high { background: linear-gradient(135deg, #d47519, #ffa657); box-shadow: 0 2px 8px rgba(255,166,87,0.3); }
  .bar-medium { background: linear-gradient(135deg, #9e6a03, #d2992a); box-shadow: 0 2px 8px rgba(210,153,34,0.3); }
  .bar-low { background: linear-gradient(135deg, #484f58, #8b949e); box-shadow: 0 2px 8px rgba(139,148,158,0.2); }
  .bar-none { background: linear-gradient(135deg, #30363d, #484f58); box-shadow: 0 2px 8px rgba(72,79,88,0.2); }
  .bar-overdue {
    background: linear-gradient(135deg, #da3633, #f85149) !important;
    box-shadow: 0 2px 12px rgba(248,81,73,0.5) !important;
    animation: pulse 2s ease-in-out infinite;
  }
  .bar-done {
    background: linear-gradient(135deg, #1a7f37, #2ea043);
    box-shadow: 0 2px 8px rgba(46,160,67,0.25);
    opacity: 0.7;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.75; } }

  /* --- Done section --- */
  .done-container {
    background: #161b22; border-radius: 12px;
    border: 1px solid #21262d; overflow-x: auto;
  }
  .done-container .gantt-row { opacity: 0.6; }
  .done-container .gantt-row:hover { opacity: 1; background: rgba(46,160,67,0.04); }
  .done-container .task-title { text-decoration: line-through; text-decoration-color: #484f58; }

  /* --- Loading --- */
  .loading-state {
    text-align: center; padding: 80px 20px; color: #8b949e;
  }
  .loading-state .big-spinner {
    width: 40px; height: 40px; margin: 0 auto 16px;
    border: 3px solid #21262d; border-top-color: #58a6ff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  /* --- Empty --- */
  .empty-state {
    text-align: center; padding: 80px 20px; color: #484f58;
  }
  .empty-state h3 { font-size: 16px; color: #8b949e; margin-bottom: 8px; }

  /* --- Detail Panel --- */
  .panel-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 150;
    opacity: 0; visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  .panel-backdrop.open { opacity: 1; visibility: visible; }
  .detail-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 440px; max-width: 100%;
    background: #161b22;
    border-left: 1px solid #30363d;
    z-index: 160;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-backdrop.open .detail-panel { transform: translateX(0); }
  .panel-accent { height: 3px; flex-shrink: 0; }
  .panel-header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 24px 0; flex-shrink: 0;
  }
  .panel-id {
    font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
    padding: 3px 10px; border-radius: 6px;
  }
  .panel-close {
    margin-left: auto;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid #30363d; border-radius: 8px;
    color: #8b949e; cursor: pointer;
    transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .panel-close:hover { background: #21262d; color: #e1e4e8; }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 20px 24px 32px;
    scrollbar-width: thin; scrollbar-color: #30363d transparent;
  }
  .panel-title {
    font-size: 18px; font-weight: 700; color: #fff;
    line-height: 1.4; margin-bottom: 20px;
  }
  .panel-meta-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 24px;
  }
  .panel-meta-item {
    background: #1c2129; border: 1px solid #21262d;
    border-radius: 8px; padding: 12px 14px;
  }
  .panel-meta-label {
    font-size: 10px; font-weight: 600; color: #484f58;
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
  }
  .panel-meta-value { font-size: 14px; font-weight: 600; color: #e1e4e8; }
  .panel-desc-header {
    font-size: 11px; font-weight: 600; color: #484f58;
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 12px; padding-top: 20px;
    border-top: 1px solid #21262d;
  }
  .panel-desc {
    font-size: 13px; color: #c9d1d9; line-height: 1.7;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .panel-desc:empty ~ .panel-desc-header,
  .panel-empty-desc { display: none; }
  .panel-drag-hint { display: none; }

  /* --- Mobile --- */
  @media (max-width: 768px) {
    body { padding: 16px; }
    .header { margin-bottom: 24px; }
    .header h1 { font-size: 22px; }
    .header p { font-size: 13px; }
    .stats-row { gap: 8px; margin-bottom: 20px; }
    .stat-card { padding: 12px 16px; min-width: 0; flex: 1 1 calc(50% - 4px); }
    .stat-value { font-size: 20px; }
    .stat-label { font-size: 10px; }
    .legend { gap: 16px; margin-bottom: 20px; }
    .legend-item { font-size: 12px; }
    .toolbar { gap: 8px; }
    .task-info { min-width: 200px !important; max-width: 200px !important; width: 200px !important; padding: 10px 12px !important; }
    .task-title { max-width: 180px; font-size: 12px; }
    .task-id { font-size: 10px; }
    .col-priority { display: none; }
    .task-due { padding: 10px 12px; width: 90px; min-width: 90px; font-size: 11px; }
    .gantt-header th { padding: 10px 12px; }
    .detail-panel {
      top: auto; right: 0; bottom: 0; left: 0;
      width: 100%; max-height: 75vh;
      border-left: none; border-top: 1px solid #30363d;
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
    }
    .panel-backdrop.open .detail-panel { transform: translateY(0); }
    .panel-drag-hint { display: none; }
    .panel-accent { display: none; }
    .section-header { margin-top: 24px; }
    .section-header h2 { font-size: 14px; }
  }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .header h1 { font-size: 18px; }
    .stat-card { flex: 1 1 100%; }
    .task-info { min-width: 160px !important; max-width: 160px !important; width: 160px !important; }
    .task-title { max-width: 140px; }
    .col-due { display: none; }
    .auth-box { padding: 24px; margin: 0 12px; }
  }
</style>
</head>
<body>

<!-- Auth Overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>Connect to Linear</h2>
    <p>Enter your Linear API key to view your project timeline. Your key is stored locally in your browser.</p>
    <input type="password" class="auth-input" id="apiKeyInput" placeholder="lin_api_xxxxxxxxxxxxxxxx" autocomplete="off">
    <button class="auth-btn" id="authBtn" onclick="authenticate()">Connect</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- Main content -->
<div class="header">
  <h1 id="teamTitle">Loading...</h1>
  <p id="subtitle">Connecting to Linear...</p>
</div>

<div class="toolbar">
  <button class="toolbar-btn" id="refreshBtn" onclick="refreshData()">
    <span class="spinner"></span> Refresh
  </button>
  <button class="toolbar-btn danger" onclick="logout()">Disconnect</button>
  <span class="last-synced" id="lastSynced"></span>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#da3633,#f85149)"></div> Urgent</div>
  <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#d47519,#ffa657)"></div> High</div>
  <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#9e6a03,#d2992a)"></div> Medium</div>
  <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#484f58,#8b949e)"></div> Low</div>
  <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#1a7f37,#2ea043)"></div> Done</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(88,166,255,0.3); border: 1px dashed #58a6ff;"></div> Today</div>
</div>

<div class="gantt-container" id="ganttContainer">
  <div class="loading-state" id="loadingState">
    <div class="big-spinner"></div>
    <div>Fetching issues from Linear...</div>
  </div>
</div>

<div class="section-header" id="doneHeader" style="display:none">
  <h2>Completed</h2>
  <span class="task-count" id="doneCount">0</span>
  <button class="section-toggle" id="doneToggle" onclick="toggleDone()">Hide</button>
</div>

<div class="done-container" id="doneContainer" style="display:none"></div>

<div class="panel-backdrop" id="panelBackdrop">
  <div class="detail-panel" id="detailPanel">
    <div class="panel-drag-hint"></div>
    <div class="panel-accent" id="panelAccent"></div>
    <div class="panel-header">
      <div class="panel-id" id="panelId"></div>
      <button class="panel-close" id="panelClose"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg></button>
    </div>
    <div class="panel-body">
      <h3 class="panel-title" id="panelTitle"></h3>
      <div class="panel-meta-grid" id="panelMeta"></div>
      <div class="panel-desc-header" id="panelDescHeader">Description</div>
      <div class="panel-desc" id="panelDesc"></div>
    </div>
  </div>
</div>

<script>
// ---- Config ----
const LINEAR_API = 'https://api.linear.app/graphql';
const PROJECT_ID = '6fd95388-6121-4205-aadc-8c5cb4f555fa';
const PRIORITY_MAP = { 0: 'None', 1: 'Urgent', 2: 'High', 3: 'Medium', 4: 'Low' };
const DAY_WIDTH = 28;

// ---- State ----
let apiKey = localStorage.getItem('linear_api_key') || '';
let cachedActive = [];
let cachedDone = [];
let doneVisible = true;

// ---- Auth ----
function checkAuth() {
  if (apiKey) {
    document.getElementById('authOverlay').classList.add('hidden');
    refreshData();
  }
}

async function authenticate() {
  const input = document.getElementById('apiKeyInput');
  const btn = document.getElementById('authBtn');
  const err = document.getElementById('authError');
  const key = input.value.trim();
  if (!key) { err.textContent = 'Please enter an API key.'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Connecting...';
  err.style.display = 'none';

  try {
    const res = await fetch(LINEAR_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': key },
      body: JSON.stringify({ query: '{ viewer { id name } }' })
    });
    const data = await res.json();
    if (data.errors || !data.data?.viewer) {
      throw new Error('Invalid API key');
    }
    apiKey = key;
    localStorage.setItem('linear_api_key', key);
    document.getElementById('authOverlay').classList.add('hidden');
    refreshData();
  } catch (e) {
    err.textContent = 'Authentication failed. Check your API key.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Connect';
  }
}

function logout() {
  apiKey = '';
  localStorage.removeItem('linear_api_key');
  document.getElementById('authOverlay').classList.remove('hidden');
  document.getElementById('apiKeyInput').value = '';
}

// ---- Linear GraphQL ----
async function fetchData() {
  const query = `
    query {
      project(id: "${PROJECT_ID}") {
        name
        teams(first: 5) { nodes { name } }
        issues(first: 200) {
          nodes {
            identifier
            title
            description
            dueDate
            priority
            completedAt
            state { name type }
            createdAt
          }
        }
      }
    }
  `;

  const res = await fetch(LINEAR_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': apiKey },
    body: JSON.stringify({ query })
  });

  const data = await res.json();
  if (data.errors) throw new Error(data.errors[0].message);

  const project = data.data.project;
  const teamName = project.teams?.nodes?.[0]?.name || project.name;
  const nodes = project.issues.nodes;

  const mapIssue = n => ({
    id: n.identifier,
    title: n.title,
    description: n.description || '',
    due: n.dueDate,
    priorityVal: n.priority,
    priority: PRIORITY_MAP[n.priority] || 'None',
    status: n.state?.name || '',
    statusType: n.state?.type || '',
    completedAt: n.completedAt,
  });

  const active = nodes
    .filter(n => n.dueDate && !n.completedAt)
    .map(mapIssue)
    .sort((a, b) => a.priorityVal - b.priorityVal || new Date(a.due) - new Date(b.due));

  const done = nodes
    .filter(n => n.completedAt)
    .map(mapIssue)
    .sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));

  return { teamName, active, done };
}

// ---- Refresh ----
async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  document.getElementById('ganttContainer').innerHTML =
    '<div class="loading-state"><div class="big-spinner"></div><div>Fetching issues from Linear...</div></div>';
  document.getElementById('doneHeader').style.display = 'none';
  document.getElementById('doneContainer').style.display = 'none';

  try {
    const { teamName, active, done } = await fetchData();
    cachedActive = active;
    cachedDone = done;

    document.getElementById('teamTitle').textContent = teamName + ' Roadmap';
    document.title = teamName + ' \u2014 Project Roadmap';

    renderGantt(active);
    renderDone(done);

    const now = new Date();
    document.getElementById('lastSynced').textContent =
      'Last synced: ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('ganttContainer').innerHTML =
      '<div class="empty-state"><h3>Error fetching data</h3><p>' + escHtml(e.message) + '</p></div>';
  } finally {
    btn.classList.remove('loading');
  }
}

// ---- Helpers ----
function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function isWeekend(date) { const d = date.getDay(); return d === 0 || d === 6; }

function priorityClass(val) {
  if (val === 1) return 'urgent';
  if (val === 2) return 'high';
  if (val === 3) return 'medium';
  if (val === 4) return 'low';
  return 'none';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var taskDataMap = {};

// ---- Build calendar helpers ----
function buildCalendarHeader(chartStart, totalDays, today) {
  var months = {};
  for (var i = 0; i < totalDays; i++) {
    var d = new Date(chartStart); d.setDate(d.getDate() + i);
    var mk = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    months[mk] = (months[mk] || 0) + 1;
  }
  var monthsHtml = '';
  for (var m in months) { monthsHtml += '<div class="month-label" style="width:' + (months[m] * DAY_WIDTH) + 'px">' + m + '</div>'; }
  var daysHtml = '';
  for (var i = 0; i < totalDays; i++) {
    var d = new Date(chartStart); d.setDate(d.getDate() + i);
    var isT = d.getTime() === today.getTime();
    var wk = isWeekend(d);
    var cls = 'day-cell' + (wk ? ' weekend' : '') + (isT ? ' today' : '');
    daysHtml += '<div class="' + cls + '" style="width:' + DAY_WIDTH + 'px">' + d.getDate() + '</div>';
  }
  return '<div class="month-row">' + monthsHtml + '</div><div class="days-row">' + daysHtml + '</div>';
}

function buildBgDays(chartStart, totalDays, today) {
  var bgDays = '';
  for (var i = 0; i < totalDays; i++) {
    var d = new Date(chartStart); d.setDate(d.getDate() + i);
    var isT = d.getTime() === today.getTime();
    var wk = isWeekend(d);
    bgDays += '<div class="bar-day' + (wk ? ' weekend' : '') + (isT ? ' today' : '') + '" style="width:' + DAY_WIDTH + 'px"></div>';
  }
  return bgDays;
}

// ---- Render Active Gantt ----
function renderGantt(tasks) {
  if (!tasks.length) {
    document.getElementById('ganttContainer').innerHTML =
      '<div class="empty-state"><h3>No active issues with due dates</h3><p>Add due dates to your Linear issues to see them here.</p></div>';
    document.getElementById('subtitle').textContent = 'No active tasks with due dates';
    document.getElementById('statsRow').innerHTML = '';
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);

  const allDues = tasks.map(t => new Date(t.due + 'T00:00:00'));
  const minDate = new Date(Math.min(today, ...allDues));
  const maxDate = new Date(Math.max(today, ...allDues));
  const chartStart = new Date(minDate); chartStart.setDate(chartStart.getDate() - 2);
  const chartEnd = new Date(maxDate); chartEnd.setDate(chartEnd.getDate() + 3);
  const totalDays = daysBetween(chartStart, chartEnd);

  // Stats
  const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
  tasks.forEach(t => { counts[t.priorityVal] = (counts[t.priorityVal] || 0) + 1; });
  const spanDays = daysBetween(today, allDues[allDues.length - 1]);

  document.getElementById('subtitle').textContent =
    tasks.length + ' active tasks \u00B7 ' +
    formatDate(tasks[0].due) + ' \u2013 ' + formatDate(tasks[tasks.length - 1].due);

  document.getElementById('statsRow').innerHTML =
    (counts[1] ? '<div class="stat-card stat-urgent"><div class="stat-value">' + counts[1] + '</div><div class="stat-label">Urgent</div></div>' : '') +
    (counts[2] ? '<div class="stat-card stat-high"><div class="stat-value">' + counts[2] + '</div><div class="stat-label">High</div></div>' : '') +
    (counts[3] ? '<div class="stat-card stat-medium"><div class="stat-value">' + counts[3] + '</div><div class="stat-label">Medium</div></div>' : '') +
    (counts[4] ? '<div class="stat-card stat-low"><div class="stat-value">' + counts[4] + '</div><div class="stat-label">Low</div></div>' : '') +
    '<div class="stat-card"><div class="stat-value">' + spanDays + ' days</div><div class="stat-label">Total Span</div></div>';

  var calHeader = buildCalendarHeader(chartStart, totalDays, today);
  var bgDays = buildBgDays(chartStart, totalDays, today);

  var html = '<table class="gantt-table"><thead><tr class="gantt-header">' +
    '<th style="width:320px;min-width:320px">Task</th>' +
    '<th class="col-priority" style="width:100px;min-width:100px">Priority</th>' +
    '<th class="col-due" style="width:110px;min-width:110px">Due Date</th>' +
    '<th class="calendar-header">' + calHeader + '</th>' +
    '</tr></thead><tbody>';

  taskDataMap = {};
  tasks.forEach(function(task) {
    taskDataMap[task.id] = task;
    var pCls = priorityClass(task.priorityVal);
    var dueDate = new Date(task.due + 'T00:00:00');
    var daysLeft = daysBetween(today, dueDate);
    var overdue = daysLeft < 0;
    var idColor = pCls === 'urgent' ? '#f85149' : pCls === 'high' ? '#ffa657' : pCls === 'medium' ? '#d2992a' : '#8b949e';

    var barStartDay = daysBetween(chartStart, today);
    var barEndDay = daysBetween(chartStart, dueDate);
    var barLeft, barWidth;
    if (overdue) {
      barLeft = barEndDay * DAY_WIDTH;
      barWidth = Math.abs(daysLeft) * DAY_WIDTH;
    } else {
      barLeft = barStartDay * DAY_WIDTH;
      barWidth = Math.max((barEndDay - barStartDay) * DAY_WIDTH, DAY_WIDTH);
    }

    var barLabel = overdue ? Math.abs(daysLeft) + 'd overdue' : daysLeft + 'd';
    var barClass = overdue ? 'bar-overdue' : 'bar-' + pCls;

    html += '<tr class="gantt-row" data-task-id="' + escHtml(task.id) + '">' +
      '<td class="task-info">' +
        '<div class="task-id" style="color:' + idColor + '">' + escHtml(task.id) + '</div>' +
        '<div class="task-title">' + escHtml(task.title) + '</div>' +
        '<div class="task-status">' + escHtml(task.status) + '</div>' +
      '</td>' +
      '<td class="task-priority col-priority"><span class="priority-badge priority-' + pCls + '">' + task.priority + '</span></td>' +
      '<td class="task-due col-due">' + formatDate(task.due) +
        '<br><span style="font-size:10px;color:' + (overdue ? '#f85149' : daysLeft <= 14 ? '#ffa657' : '#484f58') + '">' +
        (overdue ? Math.abs(daysLeft) + 'd overdue' : daysLeft + ' days left') + '</span>' +
      '</td>' +
      '<td class="chart-cell">' +
        '<div class="chart-area" style="width:' + (totalDays * DAY_WIDTH) + 'px">' +
          '<div class="bar-track">' + bgDays + '</div>' +
          '<div class="gantt-bar ' + barClass + '"' +
            ' style="left:' + barLeft + 'px; width:' + barWidth + 'px">' +
            barLabel +
          '</div>' +
        '</div>' +
      '</td>' +
    '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('ganttContainer').innerHTML = html;
}

// ---- Render Done Tasks ----
function renderDone(tasks) {
  var header = document.getElementById('doneHeader');
  var container = document.getElementById('doneContainer');

  if (!tasks.length) {
    header.style.display = 'none';
    container.style.display = 'none';
    return;
  }

  header.style.display = 'flex';
  container.style.display = doneVisible ? 'block' : 'none';
  document.getElementById('doneCount').textContent = tasks.length;
  document.getElementById('doneToggle').textContent = doneVisible ? 'Hide' : 'Show';

  const today = new Date(); today.setHours(0,0,0,0);
  const tasksWithDue = tasks.filter(t => t.due);

  if (!tasksWithDue.length) {
    // Simple list if no tasks have due dates
    var html = '<table class="gantt-table"><thead><tr class="gantt-header">' +
      '<th style="width:320px;min-width:320px">Task</th>' +
      '<th class="col-priority" style="width:100px;min-width:100px">Priority</th>' +
      '<th class="col-due" style="width:110px;min-width:110px">Status</th>' +
      '</tr></thead><tbody>';

    tasks.forEach(function(task) {
      taskDataMap[task.id] = task;
      var pCls = priorityClass(task.priorityVal);
      html += '<tr class="gantt-row" data-task-id="' + escHtml(task.id) + '">' +
        '<td class="task-info">' +
          '<div class="task-id" style="color:#2ea043">\u2713 ' + escHtml(task.id) + '</div>' +
          '<div class="task-title">' + escHtml(task.title) + '</div>' +
          '<div class="task-status">' + escHtml(task.status) + '</div>' +
        '</td>' +
        '<td class="task-priority col-priority"><span class="priority-badge priority-' + pCls + '">' + task.priority + '</span></td>' +
        '<td class="task-due col-due">' + escHtml(task.status) + '</td>' +
      '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
    return;
  }

  // Full Gantt for done tasks with due dates
  const allDues = tasksWithDue.map(t => new Date(t.due + 'T00:00:00'));
  const minDate = new Date(Math.min(today, ...allDues));
  const maxDate = new Date(Math.max(today, ...allDues));
  const chartStart = new Date(minDate); chartStart.setDate(chartStart.getDate() - 2);
  const chartEnd = new Date(maxDate); chartEnd.setDate(chartEnd.getDate() + 3);
  const totalDays = daysBetween(chartStart, chartEnd);

  var calHeader = buildCalendarHeader(chartStart, totalDays, today);
  var bgDays = buildBgDays(chartStart, totalDays, today);

  var html = '<table class="gantt-table"><thead><tr class="gantt-header">' +
    '<th style="width:320px;min-width:320px">Task</th>' +
    '<th class="col-priority" style="width:100px;min-width:100px">Priority</th>' +
    '<th class="col-due" style="width:110px;min-width:110px">Due Date</th>' +
    '<th class="calendar-header">' + calHeader + '</th>' +
    '</tr></thead><tbody>';

  tasks.forEach(function(task) {
    taskDataMap[task.id] = task;
    var pCls = priorityClass(task.priorityVal);

    if (!task.due) {
      html += '<tr class="gantt-row" data-task-id="' + escHtml(task.id) + '">' +
        '<td class="task-info">' +
          '<div class="task-id" style="color:#2ea043">\u2713 ' + escHtml(task.id) + '</div>' +
          '<div class="task-title">' + escHtml(task.title) + '</div>' +
          '<div class="task-status">' + escHtml(task.status) + '</div>' +
        '</td>' +
        '<td class="task-priority col-priority"><span class="priority-badge priority-' + pCls + '">' + task.priority + '</span></td>' +
        '<td class="task-due col-due">\u2014</td>' +
        '<td class="chart-cell"><div class="chart-area" style="width:' + (totalDays * DAY_WIDTH) + 'px"></div></td>' +
      '</tr>';
      return;
    }

    var dueDate = new Date(task.due + 'T00:00:00');
    var barEndDay = daysBetween(chartStart, dueDate);
    var barWidth = Math.max(DAY_WIDTH * 2, DAY_WIDTH);
    var barLeft = Math.max(0, (barEndDay - 1) * DAY_WIDTH);

    html += '<tr class="gantt-row" data-task-id="' + escHtml(task.id) + '">' +
      '<td class="task-info">' +
        '<div class="task-id" style="color:#2ea043">\u2713 ' + escHtml(task.id) + '</div>' +
        '<div class="task-title">' + escHtml(task.title) + '</div>' +
        '<div class="task-status">' + escHtml(task.status) + '</div>' +
      '</td>' +
      '<td class="task-priority col-priority"><span class="priority-badge priority-' + pCls + '">' + task.priority + '</span></td>' +
      '<td class="task-due col-due">' + formatDate(task.due) + '</td>' +
      '<td class="chart-cell">' +
        '<div class="chart-area" style="width:' + (totalDays * DAY_WIDTH) + 'px">' +
          '<div class="bar-track">' + bgDays + '</div>' +
          '<div class="gantt-bar bar-done"' +
            ' style="left:' + barLeft + 'px; width:' + barWidth + 'px">\u2713</div>' +
        '</div>' +
      '</td>' +
    '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function toggleDone() {
  doneVisible = !doneVisible;
  document.getElementById('doneContainer').style.display = doneVisible ? 'block' : 'none';
  document.getElementById('doneToggle').textContent = doneVisible ? 'Hide' : 'Show';
}

// ---- Detail Panel ----
var backdrop = document.getElementById('panelBackdrop');
var selectedRowEl = null;

var PRIORITY_COLORS = {
  'Urgent': { bg: 'rgba(248,81,73,0.15)', color: '#f85149', border: 'rgba(248,81,73,0.25)', accent: '#f85149' },
  'High': { bg: 'rgba(255,166,87,0.15)', color: '#ffa657', border: 'rgba(255,166,87,0.25)', accent: '#ffa657' },
  'Medium': { bg: 'rgba(210,153,34,0.15)', color: '#d2992a', border: 'rgba(210,153,34,0.25)', accent: '#d2992a' },
  'Low': { bg: 'rgba(139,148,158,0.15)', color: '#8b949e', border: 'rgba(139,148,158,0.25)', accent: '#8b949e' },
  'None': { bg: 'rgba(72,79,88,0.15)', color: '#484f58', border: 'rgba(72,79,88,0.25)', accent: '#484f58' },
};

function stripMarkdown(md) {
  return md
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/#+\s*/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^[-*]\s+/gm, '\u2022 ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function openPanel(taskId) {
  var task = taskDataMap[taskId];
  if (!task) return;

  var pc = PRIORITY_COLORS[task.priority] || PRIORITY_COLORS['None'];
  var today = new Date(); today.setHours(0,0,0,0);
  var isDone = !!task.completedAt;

  // Accent bar
  document.getElementById('panelAccent').style.background =
    isDone ? 'linear-gradient(90deg, #1a7f37, #2ea043)' : 'linear-gradient(90deg, ' + pc.accent + ', ' + pc.accent + '44)';

  // ID badge
  var idEl = document.getElementById('panelId');
  idEl.textContent = task.id;
  idEl.style.background = isDone ? 'rgba(46,160,67,0.15)' : pc.bg;
  idEl.style.color = isDone ? '#2ea043' : pc.color;
  idEl.style.border = '1px solid ' + (isDone ? 'rgba(46,160,67,0.25)' : pc.border);

  // Title
  document.getElementById('panelTitle').textContent = task.title;

  // Meta grid
  var daysLeft = task.due ? daysBetween(today, new Date(task.due + 'T00:00:00')) : null;
  var overdue = daysLeft !== null && daysLeft < 0;

  var timeValue = '';
  var timeColor = '#e1e4e8';
  if (isDone) {
    timeValue = '\u2713 Completed';
    timeColor = '#2ea043';
  } else if (daysLeft !== null) {
    if (overdue) {
      timeValue = Math.abs(daysLeft) + 'd overdue';
      timeColor = '#f85149';
    } else {
      timeValue = daysLeft + ' days left';
      timeColor = daysLeft <= 7 ? '#ffa657' : '#e1e4e8';
    }
  } else {
    timeValue = 'No due date';
    timeColor = '#484f58';
  }

  var metaHtml =
    '<div class="panel-meta-item">' +
      '<div class="panel-meta-label">Priority</div>' +
      '<div class="panel-meta-value" style="color:' + pc.color + '">' + escHtml(task.priority) + '</div>' +
    '</div>' +
    '<div class="panel-meta-item">' +
      '<div class="panel-meta-label">Status</div>' +
      '<div class="panel-meta-value">' + escHtml(task.status) + '</div>' +
    '</div>' +
    '<div class="panel-meta-item">' +
      '<div class="panel-meta-label">Due Date</div>' +
      '<div class="panel-meta-value">' + (task.due ? formatDate(task.due) : '\u2014') + '</div>' +
    '</div>' +
    '<div class="panel-meta-item">' +
      '<div class="panel-meta-label">Time</div>' +
      '<div class="panel-meta-value" style="color:' + timeColor + '">' + timeValue + '</div>' +
    '</div>';

  document.getElementById('panelMeta').innerHTML = metaHtml;

  // Description
  var desc = task.description ? stripMarkdown(task.description) : '';
  document.getElementById('panelDesc').textContent = desc;
  document.getElementById('panelDescHeader').style.display = desc ? 'block' : 'none';

  // Highlight row
  if (selectedRowEl) selectedRowEl.classList.remove('selected');
  selectedRowEl = document.querySelector('.gantt-row[data-task-id="' + CSS.escape(taskId) + '"]');
  if (selectedRowEl) selectedRowEl.classList.add('selected');

  backdrop.classList.add('open');
}

function closePanel() {
  backdrop.classList.remove('open');
  if (selectedRowEl) { selectedRowEl.classList.remove('selected'); selectedRowEl = null; }
}

// Close panel on backdrop click
backdrop.addEventListener('click', function(e) {
  if (e.target === backdrop) closePanel();
});

// Close button
document.getElementById('panelClose').addEventListener('click', closePanel);

// Row click delegation
document.addEventListener('click', function(e) {
  var row = e.target.closest('.gantt-row[data-task-id]');
  if (row) openPanel(row.dataset.taskId);
});

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closePanel(); return; }
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT') {
    refreshData();
  }
});

// ---- Init ----
checkAuth();
</script>
